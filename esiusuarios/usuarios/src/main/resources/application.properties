spring.application.name=usuarios

server.port=8081
app.frontend-base-url=${APP_FRONTEND_URL:${FRONTEND_BASE_URL:http://localhost:4200}}
app.frontend.url=${APP_FRONTEND_URL:${FRONTEND_URL:http://localhost:4200}}

email.api.url=${EMAIL_API_URL:https://api.brevo.com/v3/smtp/email}
email.allowed-hosts=${EMAIL_ALLOWED_HOSTS:api.brevo.com}
email.api.key=${MAIL_API:dummy}
email.sender.name=${EMAIL_SENDER_NAME:ESI Entradas}
email.sender.address=${MAIL_USER:no-reply@example.com}

# SQL Server. En ejecuciones compartidas/prod, configura las variables de entorno.
spring.datasource.url=${SQLSERVER_URL:jdbc:sqlserver://${SQLSERVER_HOST:localhost}:${SQLSERVER_PORT:1433};databaseName=${SQLSERVER_DATABASE:esiusuarios};encrypt=true;trustServerCertificate=true;columnEncryptionSetting=Enabled}
spring.datasource.username=${SQLSERVER_USER:usuarios_app}
spring.datasource.password=${SQLSERVER_PASSWORD:UsuariosApp!2026}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

server.error.include-message=never
server.error.include-stacktrace=never
spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
app.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
app.session.cookie.max-age-seconds=${SESSION_COOKIE_MAX_AGE_SECONDS:7200}
app.risk-data.encryption-key=${RISK_DATA_ENCRYPTION_KEY:}
app.internal.api.secret=${INTERNAL_API_SECRET:}
app.security.headers.content-security-policy=${CONTENT_SECURITY_POLICY:default-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'}
app.security.headers.referrer-policy=${REFERRER_POLICY:no-referrer}
app.security.headers.hsts=${HSTS_HEADER:max-age=31536000; includeSubDomains}
app.rate-limit.cleanup-delay-ms=${RATE_LIMIT_CLEANUP_DELAY_MS:300000}

stripe.secret-key=sk_test_XXXX
stripe.public-key=pk_test_XXXX
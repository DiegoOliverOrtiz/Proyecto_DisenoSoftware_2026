<main class="reset-shell">
  <section class="reset-card">
    <a routerLink="/" class="brand-link">ESI Entradas</a>
    <p class="eyebrow">Seguridad</p>
    <h1>Restablecer contraseña</h1>

    <p class="lede" *ngIf="validating()">Validando enlace...</p>
    <p class="error" *ngIf="error()">{{ error() }}</p>
    <p class="success" *ngIf="message()">{{ message() }}</p>

    <form class="reset-form" *ngIf="!validating() && validToken()" (ngSubmit)="submit()">
      <label>
        Nueva contraseña
        <span class="password-input">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            autocomplete="new-password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
          />
          <button
            type="button"
            class="eye-button"
            [class.visible]="showPassword()"
            aria-label="Mostrar u ocultar contraseña"
            (click)="showPassword.set(!showPassword())"
          >
            <span class="eye-icon" aria-hidden="true"></span>
          </button>
        </span>
      </label>

      <label>
        Repetir contraseña
        <span class="password-input">
          <input
            [type]="showConfirmPassword() ? 'text' : 'password'"
            name="confirmPassword"
            autocomplete="new-password"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
          />
          <button
            type="button"
            class="eye-button"
            [class.visible]="showConfirmPassword()"
            aria-label="Mostrar u ocultar confirmacion de contraseña"
            (click)="showConfirmPassword.set(!showConfirmPassword())"
          >
            <span class="eye-icon" aria-hidden="true"></span>
          </button>
        </span>
      </label>

      <app-password-rules
        [password]="password()"
        [confirmPassword]="confirmPassword()"
      />

      <button type="submit" class="submit-button" [disabled]="loading() || !passwordValid()">
        {{ loading() ? 'Guardando...' : 'Guardar contraseña' }}
      </button>
    </form>

    <a routerLink="/" class="back-link">Volver al inicio</a>
  </section>
</main>

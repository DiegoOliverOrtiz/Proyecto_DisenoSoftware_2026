<div class="strength">
  <span>Fortaleza: {{ strength.label }}</span>
  <div class="strength-track">
    <span class="strength-bar" [class]="strength.level" [style.width.%]="strength.score"></span>
  </div>
</div>

<ul class="password-rules">
  <li *ngFor="let rule of rules" [class.valid]="rule.valid">
    <span aria-hidden="true">{{ rule.valid ? 'OK' : 'x' }}</span>
    {{ rule.label }}
  </li>
</ul>

<main class="reset-shell">
  <section class="reset-card">
    <a routerLink="/" class="brand-link">ESI Entradas</a>
    <p class="eyebrow">Acceso seguro</p>
    <h1>Recuperar contraseña</h1>
    <p class="lede">
      Introduce tu correo y te enviaremos instrucciones para restablecer la contraseña.
    </p>

    <form class="reset-form" (ngSubmit)="submit()">
      <label>
        Correo electrónico
        <input
          type="email"
          name="email"
          autocomplete="email"
          placeholder="tu@email.com"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
        />
      </label>

      <button type="submit" [disabled]="loading() || !email().trim()">
        {{ loading() ? 'Enviando...' : 'Recuperar contraseña' }}
      </button>
    </form>

    <p class="success" *ngIf="message()">{{ message() }}</p>
    <p class="error" *ngIf="error()">{{ error() }}</p>

    <a routerLink="/" class="back-link">Volver al inicio</a>
  </section>
</main>
